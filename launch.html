<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART on FHIR Launching...</title>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient@2/build/fhir-client.min.js"></script>
</head>
<body>
    <div style="font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f8fafc;">
        <div class="loader"></div>
        <p style="margin-top: 24px; color: #475569; font-size: 16px; font-weight: 500;">正在連接 FHIR 醫療資料庫並進行安全性驗證...</p>
        <p style="margin-top: 8px; color: #94a3b8; font-size: 14px;">Client ID: cc344727-6f90-496c-94fd-c7829aa9a51d</p>
        <p id="status" style="margin-top: 12px; color: #64748b; font-size: 13px;"></p>
    </div>

    <script>
        const statusEl = document.getElementById('status');

        function updateStatus(message, color = '#64748b') {
            statusEl.textContent = message;
            statusEl.style.color = color;
        }

        async function launchSMART() {
            try {
                updateStatus("正在取得 FHIR Server 資訊...");

                const iss = new URLSearchParams(window.location.search).get("iss");
                
                if (!iss) {
                    throw new Error("缺少 iss 參數！請確認 launch URL 是否包含 ?iss=... ");
                }

                updateStatus(`FHIR Server: ${iss}`, "#3b82f6");

                await FHIR.oauth2.authorize({
                    clientId: "cc344727-6f90-496c-94fd-c7829aa9a51d",
                    scope: "patient/*.read user/Patient.read openid fhirUser profile launch",
                    redirectUri: "index.html",
                    iss: iss,
                    // 可選：增加完整性檢查
                    redirectOnSuccess: true
                });

            } catch (error) {
                console.error("SMART Launch 失敗:", error);
                updateStatus("啟動失敗: " + error.message, "#ef4444");
            }
        }

        // 頁面載入後自動執行
        window.onload = launchSMART;
    </script>

    <style>
        .loader {
            border: 4px solid #e2e8f0;
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
