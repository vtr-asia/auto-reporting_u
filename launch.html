<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>慢性病連續處方箋自動申報 - Launch</title>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient@2/dist/fhir-client.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; text-align: center; padding: 50px; }
        .loading { font-size: 18px; color: #0066cc; }
    </style>
</head>
<body>
    <h1>心血管慢性病連續處方箋自動申報</h1>
    <p class="loading">正在進行 OAuth 授權，請稍候...</p>

    <script>
        // 您的 confidential client 資訊（建議實際上線時移到後端 proxy，避免前端暴露 secret）
        const clientId = "cc344727-6f90-496c-94fd-c7829aa9a51d";
        const clientSecret = "79f04b56b33491716c0880af72cdef7d3f0629111421cedd18353651cd313d9e";

        // SMART on FHIR 授權流程
        FHIR.oauth2.authorize({
            client_id: clientId,
            client_secret: clientSecret,   // confidential client 使用
            scope: "launch/patient patient/Patient.read patient/Condition.read patient/Observation.read patient/MedicationRequest.read openid fhirUser",
            redirect_uri: window.location.origin + "/index.html",   // 重要：改成您實際的 index.html 完整路徑
            aud: new URLSearchParams(window.location.search).get("iss") || undefined
        }).catch(err => {
            console.error("授權失敗", err);
            document.body.innerHTML = `<p style="color:red;">授權失敗：${err.message}</p>`;
        });
    </script>
</body>
</html>
