<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>慢性病連續處方箋自動申報</title>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient@2/dist/fhir-client.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; margin: 20px; line-height: 1.6; }
        .info { background: #f0f8ff; padding: 15px; border-radius: 8px; margin: 15px 0; }
        .data { white-space: pre-wrap; background: #f8f8f8; padding: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>心血管慢性病連續處方箋自動申報小助手</h1>
    
    <div id="patientInfo" class="info"></div>
    <div id="medsInfo" class="info"></div>
    <div id="conditionsInfo" class="info"></div>
    <div id="obsInfo" class="info"></div>

    <script>
        // 授權成功後執行
        FHIR.oauth2.ready().then(async (client) => {
            try {
                // 1. 抓取病人基本資料（名字 + ID）
                const patient = await client.patient.read();
                const name = patient.name && patient.name[0] 
                    ? (patient.name[0].text || 
                       `${patient.name[0].family || ''} ${ (patient.name[0].given || []).join(' ') }`.trim())
                    : "未知姓名";
                
                const patientId = patient.id;

                document.getElementById("patientInfo").innerHTML = `
                    <strong>病人姓名：</strong> ${name}<br>
                    <strong>病人 ID：</strong> ${patientId}<br>
                    <strong>性別：</strong> ${patient.gender || '未知'}<br>
                    <strong>出生日期：</strong> ${patient.birthDate || '未知'}
                `;

                // 2. 抓取 APP 主題相關資料（心血管慢性處方）
                console.log("正在抓取病人相關資料...");

                // 慢性病況（Condition）
                const conditions = await client.request(`Condition?patient=${patientId}&category=problem-list-item&_count=50`);
                document.getElementById("conditionsInfo").innerHTML = `
                    <strong>慢性病況（Condition）：</strong><br>
                    <div class="data">${JSON.stringify(conditions, null, 2)}</div>
                `;

                // 活躍處方（MedicationRequest） - 心血管相關可再加 filter
                const meds = await client.request(`MedicationRequest?patient=${patientId}&status=active&_count=50`);
                document.getElementById("medsInfo").innerHTML = `
                    <strong>活躍處方（MedicationRequest）：</strong><br>
                    <div class="data">${JSON.stringify(meds, null, 2)}</div>
                `;

                // 觀察值（Observation） - 血壓、血脂、心率等
                const obs = await client.request(`Observation?patient=${patientId}&category=vital-signs, laboratory&_count=50`);
                document.getElementById("obsInfo").innerHTML = `
                    <strong>觀察值（Observation）：</strong><br>
                    <div class="data">${JSON.stringify(obs, null, 2)}</div>
                `;

                // 後續可在此處加入：
                // - CQL 檢核邏輯
                // - 產生 Claim 資源進行自動申報
                // - UI 顯示適合的連續處方建議

                console.log("資料抓取完成！");

            } catch (err) {
                console.error("資料抓取失敗", err);
                document.body.innerHTML += `<p style="color:red;">資料抓取失敗：${err.message}</p>`;
            }
        }).catch(err => {
            console.error("SMART ready 失敗", err);
            document.body.innerHTML = `<p style="color:red;">授權或初始化失敗：${err.message}</p>`;
        });
    </script>
</body>
</html>
